name: Blogger Auto Post

on:
 workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Python setup
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install packages
      run: pip install -r requirements.txt

    - name: Run script
      run: python post.py
